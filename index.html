<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup Qualifiers Scores</title>
    <script>
        const scores = [
            { match: 'Team A vs Team B', score: '1-0' },
            { match: 'Team C vs Team D', score: '2-2' },
            { match: 'Team E vs Team F', score: '0-3' }
        ];

        function displayScores() {
            const scoresList = document.getElementById('scores');
            scores.forEach(score => {
                const listItem = document.createElement('li');
                listItem.textContent = `${score.match}: ${score.score}`;
                scoresList.appendChild(listItem);
            });
        }
    </script>
</head>
<body onload="displayScores()">
    <h1>World Cup Qualifiers Scores</h1>
    <ul id="scores"></ul>
</body>
</html>
