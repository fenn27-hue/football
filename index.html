<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live UK Football Scores</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚽ Live UK Football Scores</h1>
            <p class="subtitle">Premier League • Championship • League One • League Two</p>
        </header>

        <div class="filters">
            <label for="league-filter">Filter by League:</label>
            <select id="league-filter">
                <option value="all">All UK Leagues</option>
                <option value="PL">Premier League</option>
                <option value="ELC">Championship</option>
                <option value="EL1">League One</option>
                <option value="EL2">League Two</option>
            </select>
            <span id="last-updated">Last updated: --:--</span>
        </div>

        <div id="matches-container" class="matches-container">
            <p class="loading">Loading matches...</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
