<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Football Association</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Teams</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="form-section">
            <h2>Join the Team</h2>
            <form>
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <button type="submit">Submit</button>
            </form>
        </section>
        <section class="info-section">
            <h2>Latest News</h2>
            <article>
                <h3>New Season Kicks Off!</h3>
                <p>Join us for an exciting new season of football!</p>
            </article>
            <article>
                <h3>Player Signings</h3>
                <p>Check out the latest player signings!</p>
            </article>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Football Association. All rights reserved.</p>
    </footer>
</body>
</html>
