<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live UK Football Scores</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #0056b3;
        }
        #scores {
            margin-top: 20px;
        }
        .match {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <h1>Live UK Football Scores</h1>
    <div id="scores"></div>

    <script>
        async function fetchLiveScores() {
            try {
                const response = await fetch('https://api.example.com/livescores'); // Hypothetical API
                const scores = await response.json();
                displayScores(scores);
            } catch (error) {
                console.error('Error fetching live scores:', error);
                document.getElementById('scores').innerHTML = '<p>Error fetching scores.</p>';
            }
        }

        function displayScores(scores) {
            const scoresContainer = document.getElementById('scores');
            scoresContainer.innerHTML = '';
            scores.forEach(match => {
                const matchElement = document.createElement('div');
                matchElement.classList.add('match');
                matchElement.innerHTML = `<strong>${match.team1}</strong> vs <strong>${match.team2}</strong> - ${match.score}`;
                scoresContainer.appendChild(matchElement);
            });
        }

        // Fetch scores every minute
        setInterval(fetchLiveScores, 60000);
        fetchLiveScores(); // Initial fetch
    </script>
</body>
</html>
